services:
  postgres:
    image: postgres:15
    container_name: healthcare_db
    environment:
      POSTGRES_USER: towhid
      POSTGRES_PASSWORD: password
      POSTGRES_DB: healthcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
